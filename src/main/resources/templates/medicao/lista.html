<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head th:replace="~{layout/fragments :: head('Medições — Neocare')}"></head>
<body>
<nav th:replace="~{layout/fragments :: navbar}"></nav>

<main class="container">
    <div class="page-header">
        <h2>Minhas Medições</h2>
        <div class="page-actions">
            <a th:href="@{/medicoes-web/nova-estresse}" class="btn btn-primary">Nova Medição de Estresse</a>
            <a th:href="@{/medicoes-web/nova-vital}" class="btn btn-primary">Nova Medição Vital</a>
        </div>
    </div>

    <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>

    <!-- Medições de Estresse -->
    <section class="dashboard-section">
        <h3>Medições de Estresse</h3>
        <div th:if="${#lists.isEmpty(medicoesEstresse)}" class="empty-state">
            Nenhuma medição de estresse registrada.
        </div>
        <div th:unless="${#lists.isEmpty(medicoesEstresse)}" class="table-wrapper">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Data</th>
                    <th>HRV (ms)</th>
                    <th>GSR (μS)</th>
                    <th>Tipo</th>
                    <th>Predição</th>
                    <th>Score</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="m : ${medicoesEstresse}" th:with="pred=${predicoesEstresse?.get(m.id)}">
                    <td th:text="${#temporals.format(m.dataMedicao, 'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${m.variacaoFrequenciaCardiaca}"></td>
                    <td th:text="${m.condutividadePele}"></td>
                    <td th:text="${m.tipoMedicao}"></td>
                    <td th:text="${pred != null ? pred.predicao : '—'}"></td>
                    <td th:text="${pred != null ? #numbers.formatDecimal(pred.score, 1, 4) : '—'}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

    <!-- Medições Vitais -->
    <section class="dashboard-section">
        <h3>Medições Vitais</h3>
        <div th:if="${#lists.isEmpty(medicoesVitais)}" class="empty-state">
            Nenhuma medição vital registrada.
        </div>
        <div th:unless="${#lists.isEmpty(medicoesVitais)}" class="table-wrapper">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Data</th>
                    <th>BPM</th>
                    <th>SpO2 (%)</th>
                    <th>PA (mmHg)</th>
                    <th>Predição</th>
                    <th>Score</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="m : ${medicoesVitais}" th:with="pred=${predicoesVitais?.get(m.id)}">
                    <td th:text="${#temporals.format(m.dataMedicao, 'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${m.batimentosPorMinuto}"></td>
                    <td th:text="${m.oxigenacaoSangue}"></td>
                    <td th:text="${m.pressaoSistolica != null && m.pressaoDiastolica != null ? m.pressaoSistolica + '/' + m.pressaoDiastolica : '—'}"></td>
                    <td th:text="${pred != null ? pred.predicao : '—'}"></td>
                    <td th:text="${pred != null ? #numbers.formatDecimal(pred.score, 1, 4) : '—'}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<footer th:replace="~{layout/fragments :: footer}"></footer>
</body>
</html>
